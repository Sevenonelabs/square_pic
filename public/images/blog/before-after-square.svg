<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <rect width="800" height="420" rx="12" fill="#0d1114"/>
  <rect x="0.5" y="0.5" width="799" height="419" rx="12" stroke="rgba(255,255,255,0.06)"/>
  
  <!-- Label -->
  <text x="400" y="36" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">BEFORE → AFTER</text>
  
  <!-- Before image (rectangle) -->
  <rect x="60" y="60" width="280" height="200" rx="6" fill="#1a1e24" stroke="rgba(255,255,255,0.08)"/>
  <rect x="120" y="100" width="160" height="120" rx="4" fill="#78A1BB" opacity="0.15"/>
  <rect x="140" y="120" width="60" height="40" rx="4" fill="#78A1BB" opacity="0.3"/>
  <rect x="210" y="130" width="50" height="60" rx="4" fill="#78A1BB" opacity="0.25"/>
  <circle cx="170" cy="150" r="15" fill="#78A1BB" opacity="0.2"/>
  <text x="200" y="290" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="12">Original (rectangular)</text>
  <text x="200" y="306" text-anchor="middle" fill="#3d4752" font-family="system-ui,sans-serif" font-size="11">Portrait or landscape photo</text>

  <!-- Arrow -->
  <text x="400" y="170" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="28">→</text>

  <!-- After image (square with blur fill) -->
  <rect x="460" y="60" width="280" height="280" rx="6" fill="#1a1e24" stroke="rgba(255,255,255,0.08)"/>
  <!-- Blur background -->
  <rect x="460" y="60" width="280" height="280" rx="6" fill="url(#blurGradient)" opacity="0.4"/>
  <defs>
    <radialGradient id="blurGradient" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#78A1BB" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a1e24" stop-opacity="0.2"/>
    </radialGradient>
  </defs>
  <!-- Image content -->
  <rect x="520" y="90" width="160" height="120" rx="4" fill="#78A1BB" opacity="0.4"/>
  <rect x="540" y="110" width="60" height="40" rx="4" fill="#78A1BB" opacity="0.6"/>
  <rect x="610" y="120" width="50" height="60" rx="4" fill="#78A1BB" opacity="0.5"/>
  <circle cx="570" cy="140" r="15" fill="#78A1BB" opacity="0.4"/>
  <text x="600" y="370" text-anchor="middle" fill="#78A1BB" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Perfect Square</text>
  <text x="600" y="386" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="11">Preserved without cropping</text>
</svg>