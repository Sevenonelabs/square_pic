<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" fill="none">
  <rect width="800" height="460" rx="12" fill="#0d1114"/>
  <rect x="0.5" y="0.5" width="799" height="459" rx="12" stroke="rgba(255,255,255,0.06)"/>
  
  <!-- Editor area -->
  <rect x="30" y="25" width="500" height="400" rx="8" fill="#1a1e24" stroke="rgba(255,255,255,0.06)"/>
  <!-- Canvas preview -->
  <rect x="80" y="60" width="400" height="340" rx="6" fill="#0d1114"/>
  <!-- Blur background -->
  <rect x="80" y="60" width="400" height="340" rx="6" fill="url(#previewBlur)" opacity="0.5"/>
  <!-- Image on canvas -->
  <rect x="130" y="90" width="300" height="230" rx="4" fill="#2a3a4a" opacity="0.5"/>
  <rect x="150" y="110" width="100" height="70" rx="3" fill="#3a5a7a" opacity="0.4"/>
  <rect x="270" y="125" width="80" height="90" rx="3" fill="#3a5a7a" opacity="0.3"/>
  <circle cx="200" cy="140" r="20" fill="#3a5a7a" opacity="0.35"/>
  
  <defs>
    <radialGradient id="previewBlur" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#2a3a4a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d1114" stop-opacity="0.1"/>
    </radialGradient>
  </defs>

  <!-- Controls panel -->
  <rect x="555" y="25" width="215" height="400" rx="8" fill="#1a1e24" stroke="rgba(255,255,255,0.06)"/>
  
  <!-- Control groups -->
  <rect x="570" y="40" width="185" height="70" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)"/>
  <text x="585" y="58" fill="#576675" font-family="system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="1">PADDING</text>
  <rect x="580" y="67" width="70" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="580" y="67" width="25" height="4" rx="2" fill="#78A1BB"/>
  <text x="700" y="71" fill="#576675" font-family="system-ui,sans-serif" font-size="9">10%</text>
  <rect x="580" y="80" width="30" height="18" rx="3" fill="rgba(120,161,187,0.15)" stroke="rgba(120,161,187,0.3)"/>
  <text x="595" y="92" fill="#78A1BB" font-family="system-ui,sans-serif" font-size="8" font-weight="600">BLUR</text>
  <rect x="615" y="80" width="30" height="18" rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)"/>
  <text x="624" y="92" fill="#576675" font-family="system-ui,sans-serif" font-size="8">SOLID</text>
  <rect x="650" y="80" width="30" height="18" rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)"/>
  <text x="659" y="92" fill="#576675" font-family="system-ui,sans-serif" font-size="8">CROP</text>

  <rect x="570" y="120" width="185" height="55" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)"/>
  <text x="585" y="138" fill="#576675" font-family="system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="1">BLUR INTENSITY</text>
  <rect x="580" y="150" width="160" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="580" y="150" width="60" height="4" rx="2" fill="#78A1BB"/>
  <text x="700" y="155" fill="#576675" font-family="system-ui,sans-serif" font-size="9">35px</text>

  <rect x="570" y="185" width="185" height="80" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)"/>
  <text x="585" y="203" fill="#576675" font-family="system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="1">ADJUSTMENTS</text>
  <text x="585" y="220" fill="#576675" font-family="system-ui,sans-serif" font-size="9">Zoom</text>
  <text x="730" y="220" fill="#576675" font-family="system-ui,sans-serif" font-size="9">100%</text>
  <rect x="585" y="226" width="150" height="3" rx="1.5" fill="rgba(255,255,255,0.08)"/>
  <rect x="585" y="226" width="75" height="3" rx="1.5" fill="#78A1BB"/>
  <text x="585" y="246" fill="#576675" font-family="system-ui,sans-serif" font-size="9">Radius</text>
  <text x="730" y="246" fill="#576675" font-family="system-ui,sans-serif" font-size="9">8px</text>
  <rect x="585" y="252" width="150" height="3" rx="1.5" fill="rgba(255,255,255,0.08)"/>
  <rect x="585" y="252" width="30" height="3" rx="1.5" fill="#78A1BB"/>

  <!-- Download button -->
  <rect x="570" y="280" width="185" height="36" rx="6" fill="#78A1BB"/>
  <text x="662" y="303" text-anchor="middle" fill="#0d1114" font-family="system-ui,sans-serif" font-size="12" font-weight="800">Download Square Image</text>

  <!-- Platform badges -->
  <rect x="570" y="330" width="185" height="80" rx="4" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.04)"/>
  <text x="585" y="348" fill="#576675" font-family="system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="1">PRESETS</text>
  <rect x="580" y="357" width="80" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <text x="620" y="369" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="7">Instagram</text>
  <rect x="665" y="357" width="80" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <text x="705" y="369" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="7">Facebook</text>
  <rect x="580" y="379" width="80" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <text x="620" y="391" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="7">LinkedIn</text>
  <rect x="665" y="379" width="80" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <text x="705" y="391" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="7">X/Twitter</text>
</svg>