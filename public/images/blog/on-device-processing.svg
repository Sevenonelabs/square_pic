<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="12" fill="#0d1114"/>
  <rect x="0.5" y="0.5" width="799" height="399" rx="12" stroke="rgba(255,255,255,0.06)"/>

  <text x="400" y="36" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">CLIENT-SIDE VS SERVER-SIDE PROCESSING</text>

  <!-- Client-side device -->
  <g transform="translate(40, 55)">
    <rect x="0" y="0" width="320" height="280" rx="8" fill="#0d1411" stroke="#1a3a28"/>
    <!-- Laptop screen -->
    <rect x="40" y="30" width="240" height="160" rx="4" fill="#1a2e22"/>
    <rect x="55" y="45" width="210" height="130" rx="2" fill="#0d1411"/>
    <rect x="70" y="60" width="100" height="80" rx="3" fill="#2a5a3a" opacity="0.4"/>
    <rect x="85" y="72" width="40" height="25" rx="2" fill="#2a5a3a" opacity="0.6"/>
    <circle cx="120" cy="90" r="10" fill="#2a5a3a" opacity="0.5"/>
    <!-- Checkmark -->
    <circle cx="250" cy="50" r="12" fill="#2a5a3a"/>
    <path d="M245 50l4 4 7-7" stroke="#22c55e" stroke-width="2" fill="none"/>
    <text x="160" y="220" text-anchor="middle" fill="#22c55e" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Your Browser</text>
    <text x="160" y="238" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="10">Processing via HTML5 Canvas</text>
    <text x="160" y="256" text-anchor="middle" fill="#3d4752" font-family="system-ui,sans-serif" font-size="10">✓ Images never leave your device</text>
    <text x="160" y="272" text-anchor="middle" fill="#3d4752" font-family="system-ui,sans-serif" font-size="10">✓ No uploads, no storage</text>
  </g>

  <!-- Arrow between -->
  <text x="380" y="200" text-anchor="middle" fill="#3d4752" font-family="system-ui,sans-serif" font-size="16">✗</text>

  <!-- Server-side -->
  <g transform="translate(440, 55)">
    <rect x="0" y="0" width="320" height="280" rx="8" fill="#140d0d" stroke="#3a1a1a"/>
    <!-- Server rack -->
    <rect x="80" y="30" width="160" height="80" rx="4" fill="#1e1414"/>
    <rect x="95" y="42" width="130" height="12" rx="2" fill="#2a1a1a"/>
    <rect x="95" y="58" width="130" height="12" rx="2" fill="#2a1a1a"/>
    <rect x="95" y="74" width="130" height="12" rx="2" fill="#2a1a1a"/>
    <!-- Cloud -->
    <rect x="60" y="140" width="200" height="50" rx="25" fill="#1e1414" stroke="#3a1a1a"/>
    <text x="160" y="170" text-anchor="middle" fill="#8a3a3a" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Remote Server</text>
    <!-- Arrow up -->
    <path d="M120 140 L120 118" stroke="#8a3a3a" stroke-width="2" marker-end="url(#arrowUp)"/>
    <path d="M200 140 L200 118" stroke="#8a3a3a" stroke-width="2" marker-end="url(#arrowUp)"/>
    <text x="160" y="225" text-anchor="middle" fill="#8a3a3a" font-family="system-ui,sans-serif" font-size="12" font-weight="700">Most Online Editors</text>
    <text x="160" y="243" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="10">Images uploaded to servers</text>
    <text x="160" y="261" text-anchor="middle" fill="#3d4752" font-family="system-ui,sans-serif" font-size="10">✗ Data retention risks</text>
    <text x="160" y="277" text-anchor="middle" fill="#3d4752" font-family="system-ui,sans-serif" font-size="10">✗ Third-party access</text>
  </g>

  <defs>
    <marker id="arrowUp" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 10L5 0L10 10" fill="#8a3a3a"/>
    </marker>
  </defs>
</svg>