<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <rect width="800" height="380" rx="12" fill="#0d1114"/>
  <rect x="0.5" y="0.5" width="799" height="379" rx="12" stroke="rgba(255,255,255,0.06)"/>
  
  <text x="400" y="36" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">THREE SQUARE METHODS</text>

  <!-- Method 1: Blur -->
  <g transform="translate(30, 55)">
    <rect x="0" y="0" width="220" height="220" rx="8" fill="#1a1e24" stroke="rgba(255,255,255,0.08)"/>
    <rect x="0" y="0" width="220" height="220" rx="8" fill="url(#blur1)" opacity="0.5"/>
    <rect x="30" y="30" width="160" height="120" rx="4" fill="#78A1BB" opacity="0.6"/>
    <rect x="45" y="45" width="60" height="35" rx="3" fill="#78A1BB" opacity="0.8"/>
    <circle cx="120" cy="70" r="12" fill="#78A1BB" opacity="0.6"/>
    <text x="110" y="265" text-anchor="middle" fill="#78A1BB" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Dynamic Blur</text>
    <text x="110" y="281" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="10">Blurred background fill</text>
    <rect x="65" y="295" width="90" height="24" rx="4" fill="rgba(120,161,187,0.1)" stroke="rgba(120,161,187,0.2)"/>
    <text x="110" y="311" text-anchor="middle" fill="#78A1BB" font-family="system-ui,sans-serif" font-size="9" font-weight="600">POPULAR</text>
  </g>
  <defs>
    <radialGradient id="blur1" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#78A1BB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a1e24" stop-opacity="0.1"/>
    </radialGradient>
  </defs>

  <!-- Method 2: Solid -->
  <g transform="translate(290, 55)">
    <rect x="0" y="0" width="220" height="220" rx="8" fill="#1a1e24" stroke="rgba(255,255,255,0.08)"/>
    <rect x="0" y="0" width="220" height="220" rx="8" fill="#1E2328"/>
    <rect x="30" y="30" width="160" height="120" rx="4" fill="#78A1BB" opacity="0.6"/>
    <rect x="45" y="45" width="60" height="35" rx="3" fill="#78A1BB" opacity="0.8"/>
    <circle cx="120" cy="70" r="12" fill="#78A1BB" opacity="0.6"/>
    <text x="110" y="265" text-anchor="middle" fill="#78A1BB" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Solid Color Fill</text>
    <text x="110" y="281" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="10">Custom color background</text>
    <rect x="65" y="295" width="90" height="24" rx="4" fill="rgba(120,161,187,0.1)" stroke="rgba(120,161,187,0.2)"/>
    <text x="110" y="311" text-anchor="middle" fill="#78A1BB" font-family="system-ui,sans-serif" font-size="9" font-weight="600">BRAND</text>
  </g>

  <!-- Method 3: Crop -->
  <g transform="translate(550, 55)">
    <rect x="0" y="0" width="220" height="220" rx="8" fill="#1a1e24" stroke="rgba(255,255,255,0.08)"/>
    <rect x="30" y="30" width="160" height="160" rx="4" fill="#78A1BB" opacity="0.6"/>
    <rect x="45" y="50" width="60" height="35" rx="3" fill="#78A1BB" opacity="0.8"/>
    <circle cx="120" cy="75" r="12" fill="#78A1BB" opacity="0.6"/>
    <text x="110" y="265" text-anchor="middle" fill="#78A1BB" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Smart Crop</text>
    <text x="110" y="281" text-anchor="middle" fill="#576675" font-family="system-ui,sans-serif" font-size="10">Center crop to square</text>
    <rect x="65" y="295" width="90" height="24" rx="4" fill="rgba(120,161,187,0.1)" stroke="rgba(120,161,187,0.2)"/>
    <text x="110" y="311" text-anchor="middle" fill="#78A1BB" font-family="system-ui,sans-serif" font-size="9" font-weight="600">SIMPLE</text>
  </g>
</svg>